services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chat-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat_assistant_dev
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    networks:
      - chat-assistant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat_assistant_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-assistant-app
    restart: unless-stopped
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chat_assistant_dev
      DB_USERNAME: chat_user
      DB_PASSWORD: changeme

      # OpenAI Configuration (set your API key here or use .env file)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your-api-key-here}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}

      # Spring Profile
      SPRING_PROFILES_ACTIVE: dev

      # JVM Options
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chat-assistant-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  chat-assistant-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
